<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>G10 Flight Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');

  :root {
    --sky: #0a1628;
    --sky2: #0d1f3c;
    --horizon: #1a3a6e;
    --accent: #00c8ff;
    --accent2: #0080ff;
    --warn: #ff6b35;
    --success: #00e5a0;
    --card: rgba(255,255,255,0.04);
    --border: rgba(0,200,255,0.15);
    --text: #e8f4ff;
    --muted: rgba(200,220,255,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--sky);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 120% 60% at 50% 0%, #0d2a5e 0%, transparent 70%),
                radial-gradient(ellipse 80% 40% at 80% 100%, #001a40 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid lines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,22,40,0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .header-top { display: flex; align-items: center; justify-content: space-between; }

  .brand { display: flex; align-items: center; gap: 10px; }

  .brand h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--success);
    font-weight: 500;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .quick-topics {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .topic-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: rgba(200,220,255,0.7);
    font-size: 12px;
    cursor: pointer;
  }

  .chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { align-items: flex-end; }
  .msg.bot { align-items: flex-start; }

  .bubble {
    max-width: 88%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14px;
  }

  .msg.user .bubble { background: linear-gradient(135deg, #0055cc, #0070ff); color: white; border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }

  .controls {
    padding: 12px 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,22,40,0.9);
    backdrop-filter: blur(12px);
  }

  .text-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 18px;
    color: var(--text);
  }

  .mic-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: rgba(0,200,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 14px auto 0;
  }

  .mic-btn.listening { border-color: #ff4040; animation: mic-pulse 1s infinite; }
  @keyframes mic-pulse { 0% { box-shadow: 0 0 0 0 rgba(255,60,60,0.3); } 100% { box-shadow: 0 0 0 15px rgba(255,60,60,0); } }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="header-top">
      <div class="brand"><h1>G10 PILOT</h1></div>
      <div class="status-badge"><div class="status-dot"></div> MANUAL LOADED</div>
    </div>
    <div class="quick-topics">
      <div class="topic-chip" onclick="ask('How do I take off?')">🛫 Take Off</div>
      <div class="topic-chip" onclick="ask('How do I do a 360 flip?')">🔄 Flip</div>
      <div class="topic-chip" onclick="ask('How do I calibrate?')">🧭 Calibrate</div>
    </div>
  </header>

  <div class="chat-scroll" id="chatScroll">
    <div class="msg bot">
      <div class="bubble">Ready for flight! I've loaded the G10 Operation Manual. How can I help?</div>
    </div>
  </div>

  <div class="controls">
    <div style="display:flex; gap:10px;">
      <input class="text-input" id="textInput" placeholder="Ask about your G10..." onkeydown="if(event.key==='Enter')sendText()">
      <button onclick="sendText()" style="background:none; border:none; cursor:pointer;">🚀</button>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</button>
  </div>
</div>

<script>
// The full G10 Manual context
const MANUAL = `... (Insert your full 800-line manual text here) ...`;

// Netlify Connection
async function callAI(question, thinkingId) {
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: "You are the G10 Flight Assistant. Answer using this manual: " + MANUAL },
          { role: 'user', content: question }
        ]
      })
    });

    const data = await resp.json();
    removeThinking(thinkingId);
    addMessage('bot', data.reply);
    if (window.speechSynthesis) speak(data.reply);
  } catch (e) {
    removeThinking(thinkingId);
    addMessage('bot', "Connection error. Ensure your Netlify function is deployed.");
  }
}

// UI Helpers[cite: 3]
function ask(q) { addMessage('user', q); const id = addThinking(); callAI(q, id); }
function sendText() { const i = document.getElementById('textInput'); if(i.value) { ask(i.value); i.value=''; } }

// Speech logic restored from original[cite: 3]
function toggleMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return alert("Please use Chrome for voice.");
  const recognition = new SpeechRecognition();
  recognition.onstart = () => document.getElementById('micBtn').classList.add('listening');
  recognition.onresult = (e) => ask(e.results[0][0].transcript);
  recognition.onend = () => document.getElementById('micBtn').classList.remove('listening');
  recognition.start();
}
</script>
</body>
</html>
