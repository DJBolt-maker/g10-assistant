<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>G10 Pilot Assistant</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1628">
<style>
  /* [Keep your existing CSS for the Rajdhani/Inter fonts and UI layout] */
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@400;500&display=swap');
  :root { --sky: #0a1628; --accent: #00c8ff; --border: rgba(0,200,255,0.15); --text: #e8f4ff; }
  body { font-family: 'Inter', sans-serif; background: var(--sky); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; width: 100%; }
  header { padding: 16px; border-bottom: 1px solid var(--border); }
  h1 { font-family: 'Rajdhani'; color: var(--accent); font-size: 20px; }
  .chat-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .bubble { padding: 12px; border-radius: 12px; font-size: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
  .user .bubble { background: #0070ff; color: white; align-self: flex-end; }
  .controls { padding: 16px; background: rgba(10,22,40,0.9); }
  .input-row { display: flex; gap: 8px; }
  input { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid var(--border); border-radius: 20px; padding: 10px; color: white; }
  button { border-radius: 50%; border: none; cursor: pointer; }
</style>
</head>
<body>

<div class="app">
  <header><h1>G10 PILOT ASSISTANT</h1></header>
  <div class="chat-scroll" id="chatScroll">
    <div class="msg bot"><div class="bubble">G10 Flight Systems Online. Standby for pre-flight check.</div></div>
  </div>
  <div class="controls">
    <div class="input-row">
      <input id="textInput" placeholder="Ask about G10..." onkeydown="if(event.key==='Enter')sendText()">
      <button onclick="sendText()" style="width:40px; background:var(--accent);">🚀</button>
    </div>
    <div style="text-align:center; margin-top:10px;">
      <button id="micBtn" onclick="toggleMic()" style="width:60px; height:60px; background:none; border:2px solid var(--accent); font-size:24px;">🎤</button>
    </div>
  </div>
</div>

<script>
// --- FULL RESTORED MANUAL CONTENT ---
const SYSTEM_INSTRUCTIONS = `You are the G10 Flight Assistant. Be concise, technical, and helpful. 
Use the following manual data for all answers:
1. CHARGING: Use provided USB cable. 50 mins for full charge. Red light on USB turns off when done.
2. PAIRING: Turn on drone (LEDs flash), then controller. Push Left Stick UP then DOWN. LEDs stop flashing when paired.
3. CALIBRATION: After pairing, push both sticks to Lower-Left 45° angle. Drone LEDs will flash and stay solid.
4. FLIGHT: One-key takeoff/land button is top left. Left stick controls altitude/rotation. Right stick controls direction.
5. FEATURES: 3D Flip (Press Flip button + move Right stick). Headless Mode (Press Headless button). Three speed modes (Low/Med/High).
6. TRIMMING: If drifting, tap the Trim buttons in the opposite direction of the drift.
7. SAFETY: Long press Speed button for Emergency Stop. Don't fly in wind or near water.`;

let isListening = false;
let recognition = null;

function setupSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.onresult = (e) => { ask(e.results[0][0].transcript); stopListening(); };
}

function toggleMic() { isListening ? stopListening() : startListening(); }
function startListening() { isListening = true; recognition.start(); document.getElementById('micBtn').style.borderColor = 'red'; }
function stopListening() { isListening = false; recognition.stop(); document.getElementById('micBtn').style.borderColor = '#00c8ff'; }

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 1.1; // Slightly faster for flight updates
  window.speechSynthesis.speak(utterance);
}

function sendText() {
  const input = document.getElementById('textInput');
  if (!input.value.trim()) return;
  ask(input.value);
  input.value = '';
}

function ask(q) {
  addMessage('user', q);
  const tId = addThinking();
  callBridge(q, tId);
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.style.display = 'flex';
  div.style.flexDirection = 'column';
  div.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';
  div.innerHTML = `<div class="bubble">${text}</div>`;
  document.getElementById('chatScroll').appendChild(div);
  document.getElementById('chatScroll').scrollTop = document.getElementById('chatScroll').scrollHeight;
}

function addThinking() {
  const id = 'think-' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.className = 'msg bot';
  div.innerHTML = `<div class="bubble">Analyzing flight telemetry...</div>`;
  document.getElementById('chatScroll').appendChild(div);
  return id;
}

// --- SECURE BRIDGE CALL ---
async function callBridge(question, thinkId) {
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [{ text: `${SYSTEM_INSTRUCTIONS}\n\nUSER QUESTION: ${question}` }]
        }]
      })
    });

    const data = await response.json();
    
    // Safely extract the text from the response
    let answer = "I'm having trouble connecting to flight systems.";
    if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
        answer = data.candidates[0].content.parts[0].text;
    }

    document.getElementById(thinkId).remove();
    addMessage('bot', answer);
    speak(answer);
  } catch (e) {
    document.getElementById(thinkId).remove();
    addMessage('bot', "System Error: Check Netlify logs.");
  }
}

window.onload = setupSpeech;
</script>
</body>
</html>
