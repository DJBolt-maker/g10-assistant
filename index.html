<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>G10 Flight Assistant</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1628">
<style>
  /* [Keep all the CSS from the previous version here - it was working well] */
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');
  :root { --sky: #0a1628; --accent: #00c8ff; --accent2: #0080ff; --success: #00e5a0; --border: rgba(0,200,255,0.15); --text: #e8f4ff; --muted: rgba(200,220,255,0.5); }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: var(--sky); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; width: 100%; }
  header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); background: rgba(10,22,40,0.8); backdrop-filter: blur(12px); }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand h1 { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
  .chat-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; flex-direction: column; gap: 4px; }
  .msg.user { align-items: flex-end; }
  .bubble { max-width: 88%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
  .msg.user .bubble { background: linear-gradient(135deg, #0055cc, #0070ff); color: white; }
  .msg.bot .bubble { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
  .controls { padding: 12px 16px 20px; border-top: 1px solid var(--border); background: rgba(10,22,40,0.9); }
  .input-row { display: flex; gap: 10px; }
  .text-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 24px; padding: 12px 18px; color: var(--text); outline: none; }
  .send-btn { width: 46px; height: 46px; border-radius: 50%; background: var(--accent2); border: none; cursor: pointer; }
  .mic-section { display: flex; flex-direction: column; align-items: center; margin-top: 10px; }
  .mic-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent); background: none; cursor: pointer; }
  .mic-btn.listening { border-color: #ff4040; background: rgba(255,60,60,0.1); }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand"><h1>G10 PILOT</h1></div>
  </header>

  <div class="chat-scroll" id="chatScroll">
    <div class="msg bot">
      <div class="bubble">G10 Assistant Online. How can I help you fly today?</div>
    </div>
  </div>

  <div class="controls">
    <div class="input-row">
      <input class="text-input" id="textInput" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')sendText()">
      <button class="send-btn" onclick="sendText()">🚀</button>
    </div>
    <div class="mic-section">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
      <div class="mic-label" id="micLabel">TAP TO SPEAK</div>
    </div>
  </div>
</div>

<script>
// --- RESTORED MANUAL DATA ---
const MANUAL = `GGBOND G10 MANUAL: Charging takes 50 mins. Flight time 8 mins. 
To Pair: Power on drone then controller. Push left stick Up then Down. 
To Calibrate: Both sticks to lower-left 45 degrees. 
Takeoff: Press One-Key Takeoff button. 
Emergency Stop: Long press Speed button. 
Flips: Press 3D Flip then move right stick.`;

let isListening = false;
let recognition = null;

// --- SPEECH ---
function setupSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.onresult = (e) => { ask(e.results[0][0].transcript); stopListening(); };
}

function toggleMic() { isListening ? stopListening() : startListening(); }
function startListening() {
  if(!recognition) return;
  isListening = true; recognition.start();
  document.getElementById('micBtn').classList.add('listening');
}
function stopListening() {
  isListening = false; recognition.stop();
  document.getElementById('micBtn').classList.remove('listening');
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

// --- CHAT ---
function sendText() {
  const input = document.getElementById('textInput');
  if (!input.value.trim()) return;
  ask(input.value);
  input.value = '';
}

function ask(question) {
  addMessage('user', question);
  const thinkId = addThinking();
  callBridge(question, thinkId);
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="bubble">${text}</div>`;
  document.getElementById('chatScroll').appendChild(div);
  document.getElementById('chatScroll').scrollTop = document.getElementById('chatScroll').scrollHeight;
}

function addThinking() {
  const id = 'think-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = id;
  div.innerHTML = `<div class="bubble">...Thinking...</div>`;
  document.getElementById('chatScroll').appendChild(div);
  return id;
}

// --- CORRECTED BRIDGE CALL ---
async function callBridge(question, thinkId) {
  try {
    const prompt = `You are a drone flight assistant. Use this manual: ${MANUAL}\n\nUser Question: ${question}`;
    
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ 
          parts: [{ text: prompt }] 
        }]
      })
    });

    const data = await resp.json();
    
    // Check if the data structure from Gemini is valid
    const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || "I couldn't find an answer in the manual.";
    
    document.getElementById(thinkId).remove();
    addMessage('bot', answer);
    speak(answer);
  } catch (e) {
    document.getElementById(thinkId).remove();
    addMessage('bot', "Connection Error. Check Netlify logs.");
  }
}

window.onload = setupSpeechRecognition;
</script>
</body>
</html>
