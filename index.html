<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>G10 Flight Assistant</title>
<!-- PWA Manifest Link -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1628">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');

  :root {
    --sky: #0a1628;
    --sky2: #0d1f3c;
    --horizon: #1a3a6e;
    --accent: #00c8ff;
    --accent2: #0080ff;
    --warn: #ff6b35;
    --success: #00e5a0;
    --card: rgba(255,255,255,0.04);
    --border: rgba(0,200,255,0.15);
    --text: #e8f4ff;
    --muted: rgba(200,220,255,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--sky);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 120% 60% at 50% 0%, #0d2a5e 0%, transparent 70%),
                radial-gradient(ellipse 80% 40% at 80% 100%, #001a40 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,22,40,0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .drone-icon {
    width: 32px;
    height: 32px;
  }

  .brand h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--success);
    font-weight: 500;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .quick-topics {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .quick-topics::-webkit-scrollbar { display: none; }

  .topic-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: rgba(200,220,255,0.7);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }

  .topic-chip:active {
    background: rgba(0,200,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-items: flex-end; }
  .msg.bot { align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .msg.user .msg-label { color: var(--accent2); }
  .msg.bot .msg-label { color: var(--success); }

  .bubble {
    max-width: 88%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14px;
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #0055cc, #0070ff);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg.bot .bubble {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .source-tag {
    display: inline-block;
    margin-top: 8px;
    padding: 3px 10px;
    background: rgba(0,200,255,0.08);
    border: 1px solid rgba(0,200,255,0.2);
    border-radius: 10px;
    font-size: 10px;
    color: var(--accent);
  }

  .thinking-dots {
    display: flex;
    gap: 5px;
    padding: 4px 0;
  }

  .thinking-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: dot-bounce 1.2s ease-in-out infinite;
    opacity: 0.6;
  }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  .controls {
    padding: 12px 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,22,40,0.9);
    backdrop-filter: blur(12px);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .text-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 18px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }

  .send-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0055cc, #00c8ff);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,150,255,0.3);
  }

  .mic-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
  }

  .mic-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: rgba(0,200,255,0.08);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mic-btn.listening {
    background: rgba(255,60,60,0.15);
    border-color: #ff4040;
    animation: mic-pulse 1s ease-in-out infinite;
  }

  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,60,60,0.3); }
    50% { box-shadow: 0 0 0 14px rgba(255,60,60,0); }
  }

  .mic-label {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<div class="app" id="mainApp">
  <header>
    <div class="header-top">
      <div class="brand">
        <svg class="drone-icon" viewBox="0 0 32 32" fill="none">
          <circle cx="8" cy="8" r="5" stroke="#00c8ff" stroke-width="1.5"/>
          <circle cx="24" cy="8" r="5" stroke="#00c8ff" stroke-width="1.5"/>
          <circle cx="8" cy="24" r="5" stroke="#00c8ff" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="5" stroke="#00c8ff" stroke-width="1.5"/>
          <rect x="10" y="10" width="12" height="12" rx="3" fill="rgba(0,200,255,0.15)" stroke="#00c8ff" stroke-width="1.2"/>
        </svg>
        <h1>G10 PILOT</h1>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        SYSTEM READY
      </div>
    </div>
    <div class="quick-topics">
      <div class="topic-chip" onclick="ask('How do I take off?')">🛫 Take Off</div>
      <div class="topic-chip" onclick="ask('How do I calibrate?')">🧭 Calibrate</div>
      <div class="topic-chip" onclick="ask('What is headless mode?')">🎯 Headless</div>
    </div>
  </header>

  <div class="chat-scroll" id="chatScroll">
    <div class="msg bot">
      <div class="msg-label">G10 ASSISTANT</div>
      <div class="bubble">
        Ready for flight. I am running via your secure Netlify bridge. Ask me anything!
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="input-row">
      <input class="text-input" id="textInput" placeholder="Ask about your G10..." onkeydown="if(event.key==='Enter')sendText()" />
      <button class="send-btn" onclick="sendText()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="mic-section">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00c8ff" stroke-width="2">
          <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/>
        </svg>
      </button>
      <div class="mic-label" id="micLabel">TAP TO SPEAK</div>
    </div>
  </div>
</div>

<script>
// --- Manual Data ---
const MANUAL = `(Paste your manual content here)`;

// --- State ---
let isListening = false;
let recognition = null;

window.onload = () => { setupSpeechRecognition(); };

// --- Voice Recognition ---
function setupSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.onresult = (e) => { ask(e.results[0][0].transcript); stopListening(); };
  recognition.onend = () => { if(isListening) stopListening(); };
}

function toggleMic() { isListening ? stopListening() : startListening(); }
function startListening() {
  if(!recognition) return;
  isListening = true;
  recognition.start();
  document.getElementById('micBtn').classList.add('listening');
  document.getElementById('micLabel').textContent = 'LISTENING...';
}
function stopListening() {
  isListening = false;
  if(recognition) recognition.stop();
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micLabel').textContent = 'TAP TO SPEAK';
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const clean = text.replace(/\[.*?\]/g, '').trim();
  window.speechSynthesis.speak(new SpeechSynthesisUtterance(clean));
}

// --- Chat Logic ---
function sendText() {
  const input = document.getElementById('textInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  ask(q);
}

function ask(question) {
  addMessage('user', question);
  const thinkId = addThinking();
  callBridge(question, thinkId);
}

function addMessage(role, text) {
  const scroll = document.getElementById('chatScroll');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="msg-label">${role==='user'?'YOU':'G10'}</div><div class="bubble">${text}</div>`;
  scroll.appendChild(div);
  scroll.scrollTop = scroll.scrollHeight;
}

function addThinking() {
  const id = 'think-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = id;
  div.innerHTML = `<div class="msg-label">G10</div><div class="bubble"><div class="thinking-dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('chatScroll').appendChild(div);
  return id;
}

// --- The Bridge Call ---
async function callBridge(question, thinkId) {
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: `Based on the manual: ${MANUAL}\n\nQuestion: ${question}` }] }]
      })
    });

    const data = await resp.json();
    const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response.";
    document.getElementById(thinkId).remove();
    addMessage('bot', answer);
    speak(answer);
  } catch (e) {
    document.getElementById(thinkId).remove();
    addMessage('bot', "Error: Ensure your Netlify function is deployed.");
  }
}
</script>
</body>
</html>
